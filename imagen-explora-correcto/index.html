<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagen Explora - Editor de Imágenes Interactivas</title>
    <!-- Tailwind CSS para un diseño rápido y moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Set de Iconos Lucide -->
    <script src="https://unpkg.com/lucide-react@0.378.0/dist/umd/lucide.min.js"></script>
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans text-gray-800 flex flex-col h-screen">

    <!-- Encabezado de la Aplicación -->
    <header class="bg-white shadow-md z-20">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">
                <i data-lucide="mouse-pointer-click" class="inline-block -mt-1"></i>
                Imagen <span class="text-gray-700">Explora</span>
            </h1>
            <div id="export-buttons" class="flex items-center space-x-2">
                <button id="preview-btn" class="bg-gray-200 text-gray-700 font-semibold py-2 px-4 rounded-lg hover:bg-gray-300 transition-colors flex items-center space-x-2 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <i data-lucide="eye" class="w-5 h-5"></i>
                    <span>Vista Previa</span>
                </button>
                <button id="export-btn" class="bg-green-500 text-white font-semibold py-2 px-4 rounded-lg hover:bg-green-600 transition-colors flex items-center space-x-2 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <i data-lucide="download" class="w-5 h-5"></i>
                    <span>Exportar</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Área Principal de Trabajo -->
    <main class="flex-grow flex md:flex-row flex-col-reverse container mx-auto p-4 gap-4 overflow-hidden">

        <!-- Panel de Herramientas y Controles -->
        <aside class="w-full md:w-72 lg:w-80 bg-white p-4 rounded-lg shadow-lg flex-shrink-0 flex flex-col">
            <div class="flex-grow">
                <h2 class="text-lg font-bold mb-4 border-b pb-2">Herramientas</h2>

                <!-- Control para subir imagen -->
                <div id="upload-container" class="text-center">
                    <label for="image-upload" class="bg-blue-500 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-600 transition-colors cursor-pointer w-full flex items-center justify-center space-x-2">
                        <i data-lucide="upload-cloud" class="w-6 h-6"></i>
                        <span>Cargar Imagen</span>
                    </label>
                    <input type="file" id="image-upload" class="hidden" accept="image/*">
                    <p class="text-xs text-gray-500 mt-2">Sube la imagen de fondo para tu actividad interactiva.</p>
                </div>

                <!-- Controles de edición (aparecen al cargar imagen) -->
                <div id="editing-controls" class="hidden mt-6">
                    <p class="font-semibold mb-2 text-gray-700">Modo de edición:</p>
                    <div class="flex space-x-2">
                        <button id="select-mode-btn" class="tool-btn active-tool" data-mode="select" title="Seleccionar y mover">
                            <i data-lucide="move" class="w-5 h-5"></i>
                        </button>
                        <button id="draw-mode-btn" class="tool-btn" data-mode="draw" title="Dibujar nueva zona">
                            <i data-lucide="square" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">Haz clic y arrastra sobre la imagen para crear una zona activa.</p>

                    <div id="hotspot-details" class="mt-6 hidden">
                        <h3 class="font-bold border-b pb-2 mb-3">Zona Seleccionada</h3>
                        <p id="hotspot-id" class="text-sm text-gray-600 mb-2"></p>
                        <button id="edit-content-btn" class="bg-yellow-500 text-white w-full py-2 rounded-lg hover:bg-yellow-600 transition-colors flex items-center justify-center space-x-2">
                            <i data-lucide="pencil" class="w-5 h-5"></i>
                            <span>Editar Contenido</span>
                        </button>
                        <button id="delete-hotspot-btn" class="bg-red-500 text-white w-full py-2 mt-2 rounded-lg hover:bg-red-600 transition-colors flex items-center justify-center space-x-2">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                            <span>Eliminar Zona</span>
                        </button>
                    </div>
                </div>
            </div>
            <div class="text-center mt-4">
                 <button id="clear-project-btn" class="text-sm text-red-500 hover:text-red-700 hover:underline">Limpiar todo</button>
            </div>
        </aside>

        <!-- Lienzo de Edición -->
        <div id="canvas-container" class="flex-grow bg-white rounded-lg shadow-lg flex items-center justify-center overflow-auto p-2 relative">
            <div id="placeholder-text" class="text-gray-400 text-center">
                <i data-lucide="image" class="mx-auto w-16 h-16"></i>
                <p class="mt-2">Esperando una imagen...</p>
            </div>
            <canvas id="editor-canvas" class="hidden"></canvas>
        </div>
    </main>

    <!-- Modal para editar contenido del Hotspot -->
    <div id="content-modal" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-2xl p-6 w-11/12 md:w-1/2 lg:w-1/3 animate-fade-in">
            <h2 class="text-2xl font-bold mb-4">Editar Contenido</h2>
            
            <form id="content-form" onsubmit="return false;">
                <input type="hidden" id="editing-hotspot-id">
                <div class="mb-4">
                    <label for="content-type" class="block text-sm font-medium text-gray-700 mb-1">Tipo de Contenido</label>
                    <select id="content-type" class="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                        <option value="text">Texto Explicativo</option>
                        <option value="link">Enlace a Recurso Externo</option>
                        <!-- Próximamente: quiz, video, audio -->
                    </select>
                </div>

                <!-- Campo para Texto -->
                <div id="content-text-group" class="content-group space-y-2">
                    <div>
                        <label for="content-text-title" class="block text-sm font-medium text-gray-700 mb-1">Título (opcional)</label>
                        <input type="text" id="content-text-title" class="w-full p-2 border border-gray-300 rounded-md" placeholder="Ej: El Coliseo Romano">
                    </div>
                    <div>
                        <label for="content-text-body" class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
                        <textarea id="content-text-body" rows="4" class="w-full p-2 border border-gray-300 rounded-md" placeholder="Escribe aquí la información..."></textarea>
                    </div>
                </div>

                <!-- Campo para Enlace -->
                <div id="content-link-group" class="content-group hidden space-y-2">
                     <div>
                        <label for="content-link-url" class="block text-sm font-medium text-gray-700 mb-1">URL del Enlace</label>
                        <input type="url" id="content-link-url" class="w-full p-2 border border-gray-300 rounded-md" placeholder="https://ejemplo.com">
                    </div>
                    <div>
                        <label for="content-link-text" class="block text-sm font-medium text-gray-700 mb-1">Texto del botón</label>
                        <input type="text" id="content-link-text" class="w-full p-2 border border-gray-300 rounded-md" placeholder="Ej: Ver más información">
                    </div>
                </div>

            </form>

            <div class="mt-6 flex justify-end space-x-3">
                <button id="cancel-modal-btn" class="bg-gray-200 text-gray-800 font-semibold py-2 px-4 rounded-lg hover:bg-gray-300 transition-colors">Cancelar</button>
                <button id="save-content-btn" class="bg-blue-500 text-white font-semibold py-2 px-4 rounded-lg hover:bg-blue-600 transition-colors">Guardar</button>
            </div>
        </div>
    </div>


    <!-- Scripts de la Aplicación -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
